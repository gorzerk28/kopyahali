services:
  - type: web
    name: kopyahali
    env: node
    plan: free
    buildCommand: node --check app.js && node --check config.js && node --check server.js
    startCommand: node server.js
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: PORT
        value: 8000
